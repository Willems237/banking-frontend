<div class="login-page">

  <!-- Panneau gauche — branding -->
  <aside class="login-brand" aria-hidden="true">
    <div class="login-brand__content">
      <div class="login-brand__logo">
        <i class="ti ti-building-bank"></i>
      </div>
      <h1 class="login-brand__name">Axioma</h1>
      <p class="login-brand__tagline">
        La banque numérique de confiance.<br>
        Simple, sécurisée, instantanée.
      </p>
      <ul class="login-brand__features">
        <li><i class="ti ti-shield-check"></i> Transactions sécurisées</li>
        <li><i class="ti ti-bolt"></i> Virements instantanés</li>
        <li><i class="ti ti-device-mobile"></i> Accessible 24h/24</li>
      </ul>
    </div>
  </aside>

  <!-- Panneau droit — formulaire -->
  <main class="login-form-panel">
    <div class="login-card">

      <!-- En-tête -->
      <header class="login-card__header">
        <div class="login-card__logo-sm" aria-hidden="true">
          <i class="ti ti-building-bank"></i>
        </div>
        <h2 class="login-card__title">Connexion</h2>
        <p class="login-card__subtitle">
          Accédez à votre espace bancaire sécurisé
        </p>
      </header>

      <!-- Alerte erreur -->
      <div class="alert alert--danger" *ngIf="error" role="alert">
        <i class="ti ti-alert-circle" aria-hidden="true"></i>
        {{ error }}
      </div>

      <!-- Formulaire -->
      <form [formGroup]="loginForm" (ngSubmit)="onLogin()" novalidate>

        <!-- Identifiant -->
        <div class="form-group">
          <label class="form-label" for="username">
            <i class="ti ti-user" aria-hidden="true"></i>
            Identifiant
          </label>
          <input
            id="username"
            type="text"
            class="form-input"
            [class.form-input--error]="
              usernameCtrl?.invalid && usernameCtrl?.touched
            "
            formControlName="username"
            placeholder="Votre nom d'utilisateur"
            autocomplete="username"
          />
          <span class="form-error"
            *ngIf="usernameCtrl?.invalid && usernameCtrl?.touched">
            Identifiant requis (min. 3 caractères).
          </span>
        </div>

        <!-- Mot de passe -->
        <div class="form-group">
          <label class="form-label" for="password">
            <i class="ti ti-lock" aria-hidden="true"></i>
            Mot de passe
          </label>
          <div class="input-wrapper">
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              class="form-input form-input--icon-right"
              [class.form-input--error]="
                passwordCtrl?.invalid && passwordCtrl?.touched
              "
              formControlName="password"
              placeholder="Votre mot de passe"
              autocomplete="current-password"
            />
            <button
              type="button"
              class="input-toggle"
              (click)="togglePassword()"
              [attr.aria-label]="
                showPassword ? 'Masquer le mot de passe'
                             : 'Afficher le mot de passe'
              "
            >
              <i class="ti"
                 [ngClass]="showPassword ? 'ti-eye-off' : 'ti-eye'"
                 aria-hidden="true">
              </i>
            </button>
          </div>
          <span class="form-error"
            *ngIf="passwordCtrl?.invalid && passwordCtrl?.touched">
            Mot de passe requis (min. 6 caractères).
          </span>
        </div>

        <!-- Bouton submit -->
        <button
          type="submit"
          class="btn btn--primary btn--full"
          [disabled]="loginForm.invalid || submitting"
        >
          <i class="ti ti-loader-2 spin"
             *ngIf="submitting" aria-hidden="true"></i>
          {{ submitting ? 'Connexion en cours...' : 'Se connecter' }}
        </button>

      </form>

    </div>
  </main>
</div>
